version: '3.8'

services:
  # PHP/Apache Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: price-tracker-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-price_tracker}
      - DB_USER=${DB_USER:-price_tracker}
      - DB_PASS=${DB_PASS:-secret}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - TZ=Asia/Bangkok
    volumes:
      # Persist logs
      - ./logs:/var/www/html/logs
      # Development: mount source code
      # - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - price-tracker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MariaDB Database
  db:
    image: mariadb:10.11
    container_name: price-tracker-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${DB_NAME:-price_tracker}
      - MYSQL_USER=${DB_USER:-price_tracker}
      - MYSQL_PASSWORD=${DB_PASS:-secret}
      - TZ=Asia/Bangkok
    volumes:
      - db-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3307:3306"
    networks:
      - price-tracker-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=100

  # phpMyAdmin (optional, for development)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: price-tracker-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=${DB_USER:-price_tracker}
      - PMA_PASSWORD=${DB_PASS:-secret}
      - UPLOAD_LIMIT=64M
    depends_on:
      - db
    networks:
      - price-tracker-network
    profiles:
      - dev

networks:
  price-tracker-network:
    driver: bridge

volumes:
  db-data:
    driver: local
